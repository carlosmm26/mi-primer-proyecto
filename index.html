<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Primer Proyecto</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        h1 {
            font-size: 40px;
            color: #38bdf8;
        }

        p {
            font-size: 20px;
        }

        button {
            padding: 10px 20px;
            background-color: #38bdf8;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0ea5e9;
        }
    </style>
</head>
<body>

    <h1>Hola, soy Carlos 👨‍💻</h1>
    <p>Este es mi primer proyecto web subido a GitHub.</p>

    <button onclick="saludar()">Haz clic aquí</button>

    <script>
        function saludar() {
            alert("¡Voy en camino a ser desarrollador profesional! 🚀");
        }
    </script>

</body>
</html>
